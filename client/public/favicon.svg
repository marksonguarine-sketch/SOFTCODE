<?xml version="1.0" encoding="UTF-8"?>
<!--
  JOAP Hardware Trading favicon — crossed hammer and screwdriver on an
  amber rounded-square background. Designed at 64×64 but vector-clean
  for any retina size. No external deps; safe to inline.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background tile -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="#f5a623"/>
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#bgGrad)"/>
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd07a" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#d65a2a" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="handleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a06a3a"/>
      <stop offset="100%" stop-color="#6b4220"/>
    </linearGradient>
    <linearGradient id="hammerHead" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a6470"/>
      <stop offset="100%" stop-color="#2f3845"/>
    </linearGradient>
    <linearGradient id="driverShaft" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bcc4d0"/>
      <stop offset="100%" stop-color="#6b7480"/>
    </linearGradient>
    <linearGradient id="driverHandle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e84a3a"/>
      <stop offset="100%" stop-color="#a82a1a"/>
    </linearGradient>
  </defs>

  <!-- Screwdriver — angled from top-left to bottom-right -->
  <g transform="rotate(45 32 32)">
    <!-- Handle -->
    <rect x="30" y="6" width="4" height="18" rx="2" fill="url(#driverHandle)"/>
    <!-- Handle cap -->
    <rect x="29" y="6" width="6" height="3" rx="1.5" fill="#7a1a10"/>
    <!-- Collar -->
    <rect x="29" y="24" width="6" height="2" fill="#3a4250"/>
    <!-- Shaft -->
    <rect x="31" y="26" width="2" height="28" fill="url(#driverShaft)"/>
    <!-- Flat tip -->
    <polygon points="29.5,54 34.5,54 33.5,58 30.5,58" fill="#aab4c0"/>
  </g>

  <!-- Hammer — angled from top-right to bottom-left -->
  <g transform="rotate(-45 32 32)">
    <!-- Handle -->
    <rect x="30" y="22" width="4" height="32" rx="1.5" fill="url(#handleGrad)"/>
    <!-- Grip wraps -->
    <rect x="29.5" y="44" width="5" height="1.5" fill="#3a2614" opacity="0.6"/>
    <rect x="29.5" y="48" width="5" height="1.5" fill="#3a2614" opacity="0.6"/>
    <!-- Head -->
    <path d="M 22 14 L 42 14 L 44 22 L 40 22 L 40 24 L 24 24 L 24 22 L 20 22 Z" fill="url(#hammerHead)"/>
    <!-- Claw -->
    <path d="M 22 14 L 18 8 L 14 10 L 18 18 Z" fill="#3a4250"/>
    <!-- Highlight -->
    <rect x="24" y="16" width="16" height="2" fill="#7a8694" opacity="0.6"/>
  </g>

  <!-- Sparks at the crossing point -->
  <circle cx="32" cy="32" r="3" fill="#fff8d6" opacity="0.9"/>
  <circle cx="32" cy="32" r="6" fill="#ffd07a" opacity="0.35"/>
</svg>
