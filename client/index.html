    <!--
      JOAP boot loader — shown until React has mounted AND the hammer-guy
      has finished hammering every letter (J → O → A → P). Animation cycle
      is 5s; we wait one full cycle before fading the loader out, so the
      letters always finish their bounce.
    -->
    <style>
      /* ─── Boot loader (inline so it shows before JS/CSS bundles load) ─── */
      html,body { margin:0; padding:0; }
      body { background:#f4ede1; }
      #joap-loader {
        position: fixed; inset: 0; z-index: 10000;
        background: #f4ede1;
        display: flex; align-items: center; justify-content: center;
        font-family: 'Inter', system-ui, sans-serif; color: #1a1a1a;
        --pos-j:-200px; --pos-o:-125px; --pos-a:-50px; --pos-p:25px; --cycle: 5s;
        opacity: 1; transition: opacity 480ms ease-out, visibility 0s linear 480ms;
      }
      #joap-loader.is-hidden { opacity: 0; visibility: hidden; pointer-events: none; }
      #joap-loader .gridbg { position: absolute; inset: 0;
        background-image: linear-gradient(to right, rgba(26,26,26,0.045) 1px, transparent 1px), linear-gradient(to bottom, rgba(26,26,26,0.045) 1px, transparent 1px);
        background-size: 30px 30px;
        -webkit-mask-image: radial-gradient(ellipse at center, black 40%, transparent 75%);
                mask-image: radial-gradient(ellipse at center, black 40%, transparent 75%);
      }
      #joap-loader .glow { position: absolute; inset: 0;
        background: radial-gradient(circle at 25% 30%, rgba(245,166,35,0.12), transparent 40%), radial-gradient(circle at 75% 70%, rgba(214,90,42,0.10), transparent 45%);
        pointer-events: none; }
      #joap-loader .stage { position: relative; display: flex; flex-direction: column; align-items: center; gap: 22px; transform: scale(0.95); }
      @media (min-width: 768px) { #joap-loader .stage { transform: scale(1.05); } }
      #joap-loader .zone { position: relative; width: 560px; height: 340px; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding-bottom: 4px; }
      #joap-loader .walker { position: absolute; left: 50%; top: 0; width: 220px; height: 260px; margin-left: -110px; z-index: 2; filter: drop-shadow(0 8px 16px rgba(26,26,26,0.12));
        animation: jw var(--cycle) cubic-bezier(.65,.05,.36,1) infinite; }
      @keyframes jw {
        0%,18% { transform: translateX(var(--pos-j)); opacity:1; }
        25%,43%{ transform: translateX(var(--pos-o)); }
        50%,68%{ transform: translateX(var(--pos-a)); }
        75%,93%{ transform: translateX(var(--pos-p)); opacity:1; }
        96%    { transform: translateX(var(--pos-p)); opacity:0; }
        97%    { transform: translateX(var(--pos-j)); opacity:0; }
        100%   { transform: translateX(var(--pos-j)); opacity:1; }
      }
      #joap-loader .figure { width: 220px; height: 260px; animation: jbob var(--cycle) ease-in-out infinite; }
      @keyframes jbob {
        0%,18%,25%,43%,50%,68%,75%,93%,100% { transform: translateY(0); }
        21.5%,46.5%,71.5%,96.5% { transform: translateY(-5px); }
      }
      #joap-loader .leg-l, #joap-loader .boot-l { transform-origin: 86px 200px; transform-box: fill-box; animation: jsl var(--cycle) ease-in-out infinite; }
      #joap-loader .leg-r, #joap-loader .boot-r { transform-origin: 134px 210px; transform-box: fill-box; animation: jsr var(--cycle) ease-in-out infinite; }
      @keyframes jsl { 0%,18%,25%,43%,50%,68%,75%,93%,100%{transform:rotate(0)} 21.5%,46.5%,71.5%,96.5%{transform:rotate(-12deg)} }
      @keyframes jsr { 0%,18%,25%,43%,50%,68%,75%,93%,100%{transform:rotate(0)} 21.5%,46.5%,71.5%,96.5%{transform:rotate(12deg)} }
      #joap-loader .swing { transform-origin: 150px 140px; transform-box: fill-box; animation: jsw var(--cycle) cubic-bezier(.4,.0,.2,1) infinite; }
      @keyframes jsw {
        0%{transform:rotate(-65deg)} 4%{transform:rotate(-78deg)} 10%{transform:rotate(15deg)}
        14%,25%{transform:rotate(-65deg)}
        29%{transform:rotate(-78deg)} 35%{transform:rotate(15deg)}
        39%,50%{transform:rotate(-65deg)}
        54%{transform:rotate(-78deg)} 60%{transform:rotate(15deg)}
        64%,75%{transform:rotate(-65deg)}
        79%{transform:rotate(-78deg)} 85%{transform:rotate(15deg)}
        89%,100%{transform:rotate(-65deg)}
      }
      #joap-loader .hat { transform-origin: 110px 78px; transform-box: fill-box; animation: jhat var(--cycle) cubic-bezier(.4,.0,.2,1) infinite; }
      @keyframes jhat {
        0%,8%,16%,33%,41%,58%,66%,83%,91%,100%{transform:rotate(0)}
        10%,35%,60%,85%{transform:rotate(-3deg) translateY(-1px)}
        13%,38%,63%,88%{transform:rotate(1deg)}
      }
      #joap-loader .ground { position: absolute; left: 50%; bottom: 8px; width: 160px; height: 12px; transform: translateX(-50%); background: radial-gradient(ellipse, rgba(26,26,26,0.22), transparent 70%); z-index: 1; animation: jgr var(--cycle) ease-in-out infinite; }
      @keyframes jgr {
        0%,8%,14%,33%,39%,58%,64%,83%,89%,100% { transform: translateX(-50%) scaleX(1); opacity: 0.85; }
        10%,35%,60%,85% { transform: translateX(-50%) scaleX(1.1); opacity: 1; }
      }
      #joap-loader .sparks { position: absolute; left: 197px; top: 65px; width: 0; height: 0; pointer-events: none; z-index: 3; }
      #joap-loader .flash { position: absolute; left: -40px; top: -40px; width: 80px; height: 80px; border-radius: 50%; background: radial-gradient(circle, rgba(255,220,120,0.9), rgba(255,180,60,0) 60%); opacity: 0; animation: jfl var(--cycle) cubic-bezier(.4,.0,.2,1) infinite; }
      @keyframes jfl {
        0%,8%,13%,33%,38%,58%,63%,83%,88%,100% { opacity: 0; transform: scale(0.4); }
        10%,35%,60%,85% { opacity: 1; transform: scale(1.2); }
      }
      #joap-loader .sp { position: absolute; left: -2px; top: -2px; width: 4px; height: 4px; border-radius: 1px; background: #f5a623; opacity: 0; animation: jsp var(--cycle) cubic-bezier(.2,.6,.4,1) infinite; }
      #joap-loader .sp:nth-child(2){--dx:-60px;--dy:-34px}
      #joap-loader .sp:nth-child(3){--dx:-40px;--dy:-50px;background:#d65a2a}
      #joap-loader .sp:nth-child(4){--dx:-18px;--dy:-58px}
      #joap-loader .sp:nth-child(5){--dx:12px;--dy:-60px;background:#d65a2a}
      #joap-loader .sp:nth-child(6){--dx:38px;--dy:-52px}
      #joap-loader .sp:nth-child(7){--dx:56px;--dy:-32px;background:#d65a2a}
      #joap-loader .sp:nth-child(8){--dx:-72px;--dy:-12px}
      #joap-loader .sp:nth-child(9){--dx:70px;--dy:-10px;background:#d65a2a}
      @keyframes jsp {
        0%,8% { transform: translate(0,0) scale(0.4); opacity: 0; }
        10% { transform: translate(calc(var(--dx)*0.4),calc(var(--dy)*0.4)) scale(1.2); opacity: 1; }
        14% { transform: translate(var(--dx),var(--dy)) scale(0.6); opacity: 0.6; }
        17% { transform: translate(calc(var(--dx)*1.1),calc(var(--dy)*1.1 + 16px)) scale(0.2); opacity: 0; }
        18%,33% { transform: translate(0,0) scale(0.4); opacity: 0; }
        35% { transform: translate(calc(var(--dx)*0.4),calc(var(--dy)*0.4)) scale(1.2); opacity: 1; }
        39% { transform: translate(var(--dx),var(--dy)) scale(0.6); opacity: 0.6; }
        42% { transform: translate(calc(var(--dx)*1.1),calc(var(--dy)*1.1 + 16px)) scale(0.2); opacity: 0; }
        43%,58% { transform: translate(0,0) scale(0.4); opacity: 0; }
        60% { transform: translate(calc(var(--dx)*0.4),calc(var(--dy)*0.4)) scale(1.2); opacity: 1; }
        64% { transform: translate(var(--dx),var(--dy)) scale(0.6); opacity: 0.6; }
        67% { transform: translate(calc(var(--dx)*1.1),calc(var(--dy)*1.1 + 16px)) scale(0.2); opacity: 0; }
        68%,83% { transform: translate(0,0) scale(0.4); opacity: 0; }
        85% { transform: translate(calc(var(--dx)*0.4),calc(var(--dy)*0.4)) scale(1.2); opacity: 1; }
        89% { transform: translate(var(--dx),var(--dy)) scale(0.6); opacity: 0.6; }
        92% { transform: translate(calc(var(--dx)*1.1),calc(var(--dy)*1.1 + 16px)) scale(0.2); opacity: 0; }
        93%,100% { transform: translate(0,0) scale(0.4); opacity: 0; }
      }
      #joap-loader .word { position: relative; display: flex; font-family: 'Archivo Black','Inter',sans-serif; font-size: 90px; line-height: 1; letter-spacing: -0.04em; color: #1a1a1a; z-index: 1; }
      #joap-loader .ltr { display: inline-block; width: 75px; text-align: center; transform-origin: 50% 100%; text-shadow: 2px 2px 0 #f5a623, 4px 4px 0 #d65a2a; }
      #joap-loader .ltr-j { animation: jrj var(--cycle) cubic-bezier(.4,.0,.2,1) infinite; }
      #joap-loader .ltr-o { animation: jro var(--cycle) cubic-bezier(.4,.0,.2,1) infinite; }
      #joap-loader .ltr-a { animation: jra var(--cycle) cubic-bezier(.4,.0,.2,1) infinite; }
      #joap-loader .ltr-p { animation: jrp var(--cycle) cubic-bezier(.4,.0,.2,1) infinite; }
      @keyframes jrj { 0%,8%{transform:translateY(0) scaleY(1)} 10%{transform:translateY(6px) scaleY(0.86)} 12%{transform:translateY(-2px) scaleY(1.04)} 14%,100%{transform:translateY(0) scaleY(1)} }
      @keyframes jro { 0%,33%{transform:translateY(0) scaleY(1)} 35%{transform:translateY(6px) scaleY(0.86)} 37%{transform:translateY(-2px) scaleY(1.04)} 39%,100%{transform:translateY(0) scaleY(1)} }
      @keyframes jra { 0%,58%{transform:translateY(0) scaleY(1)} 60%{transform:translateY(6px) scaleY(0.86)} 62%{transform:translateY(-2px) scaleY(1.04)} 64%,100%{transform:translateY(0) scaleY(1)} }
      @keyframes jrp { 0%,83%{transform:translateY(0) scaleY(1)} 85%{transform:translateY(6px) scaleY(0.86)} 87%{transform:translateY(-2px) scaleY(1.04)} 89%,100%{transform:translateY(0) scaleY(1)} }
      #joap-loader .tag { display: flex; align-items: center; gap: 14px; font-family: 'Space Mono',monospace; font-size: 12px; font-weight: 700; letter-spacing: 0.32em; text-transform: uppercase; color: #4a4a4a; }
      #joap-loader .tline { width: 30px; height: 1px; background: #4a4a4a; opacity: 0.5; }
      #joap-loader .ttext { position: relative; padding-left: 4px; }
      #joap-loader .ttext::before { content: ''; position: absolute; left: -8px; top: 50%; width: 4px; height: 4px; background: #d65a2a; border-radius: 50%; transform: translateY(-50%); animation: jdot 1.4s ease-in-out infinite; }
      @keyframes jdot { 0%,48%{opacity:0.3; transform:translateY(-50%) scale(1)} 52%{opacity:1; transform:translateY(-50%) scale(1.6)} 100%{opacity:0.3; transform:translateY(-50%) scale(1)} }
      #joap-loader .prog { width: 200px; height: 2px; background: #d8cdb8; border-radius: 1px; overflow: hidden; }
      #joap-loader .prog-bar { width: 40%; height: 100%; background: linear-gradient(90deg, #f5a623, #d65a2a); animation: jpr 2.2s ease-in-out infinite; }
      @keyframes jpr { 0%{transform:translateX(-100%)} 100%{transform:translateX(350%)} }
      /* Hide React mount until loader is gone, then fade in */
      #root { opacity: 0; transition: opacity 280ms ease-out; }
      #root.is-ready { opacity: 1; }
      /* Respect prefers-reduced-motion: stop animations and let JS hide immediately */
      @media (prefers-reduced-motion: reduce) {
        #joap-loader * { animation: none !important; }
      }
    </style>
  </head>
  <body>

    <div id="root"></div>

    <script>
      // Wait for ONE full hammer cycle (5s) AND for the React root to render
      // its first child before dismissing the loader.
      (function () {
        var loader = document.getElementById('joap-loader');
        var root = document.getElementById('root');
        if (!loader || !root) return;
        var animationDone = false;
        var reactReady = false;
        var startedAt = performance.now();
        var MIN_DURATION = 5000;  // one full hammer cycle
        var MAX_DURATION = 12000; // bail out if React stalls

        function maybeHide() {
          if (!animationDone || !reactReady) return;
          loader.classList.add('is-hidden');
          root.classList.add('is-ready');
          setTimeout(function () { loader.remove(); }, 600);
        }

        // Watch the React root for its first painted child
        var observer = new MutationObserver(function () {
          if (root.children.length > 0) {
            reactReady = true;
            observer.disconnect();
            maybeHide();
          }
        });
        observer.observe(root, { childList: true });

        // Time the animation cycle
        setTimeout(function () { animationDone = true; maybeHide(); }, MIN_DURATION);

        // Safety: never block the app indefinitely
        setTimeout(function () {
          animationDone = true; reactReady = true; maybeHide();
        }, MAX_DURATION);
      })();
    </script>
